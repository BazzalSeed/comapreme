<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="compareme">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5d27a"/>
      <stop offset="1" stop-color="#c98e22"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- antlers -->
  <g stroke="#1f9e8c" stroke-width="3" stroke-linecap="round" fill="none">
    <path d="M24 17 q-3 -9 1 -13 q2 4 5 5"/>
    <path d="M40 17 q3 -9 -1 -13 q-2 4 -5 5"/>
  </g>
  <!-- whiskers -->
  <g stroke="#d6342b" stroke-width="2.4" stroke-linecap="round" fill="none">
    <path d="M19 40 q-8 -1 -13 -5"/>
    <path d="M45 40 q8 -1 13 -5"/>
  </g>
  <!-- head -->
  <circle cx="32" cy="34" r="18" fill="#e6b23c" stroke="#9c6a16" stroke-width="2.5"/>
  <!-- eyes -->
  <circle cx="25" cy="31" r="6.2" fill="#fff" stroke="#9c6a16" stroke-width="1.5"/>
  <circle cx="39" cy="31" r="6.2" fill="#fff" stroke="#9c6a16" stroke-width="1.5"/>
  <circle cx="25.5" cy="32" r="3" fill="#181818"/>
  <circle cx="39.5" cy="32" r="3" fill="#181818"/>
  <!-- snout -->
  <ellipse cx="32" cy="42.5" rx="8" ry="5" fill="#fbe9bf"/>
  <circle cx="29" cy="41.5" r="1.2" fill="#9c6a16"/>
  <circle cx="35" cy="41.5" r="1.2" fill="#9c6a16"/>
</svg>
